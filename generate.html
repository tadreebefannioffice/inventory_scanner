<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate QR Codes</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🏷️ Generate QR Codes</h1>
        <p class="subtitle">Create QR code stickers for your equipment</p>

        <form id="generateForm" class="generate-form">
            <div class="form-group">
                <label for="itemName">Item Name:</label>
                <input type="text" id="itemName" placeholder="e.g., Laptop, Camera, Monitor" required />
            </div>

            <div class="form-group">
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" min="1" max="100" value="5" required />
            </div>

            <div class="form-group">
                <label for="category">Category (optional):</label>
                <input type="text" id="category" placeholder="e.g., Electronics, Furniture" />
            </div>

            <button type="submit" class="btn btn-primary btn-large">Generate QR Codes</button>
        </form>

        <div id="qrOutput" style="display: none">
            <h3>Your QR Codes:</h3>
            <div id="qrGrid" class="qr-grid"></div>

            <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; justify-content: center;">
                <button onclick="downloadAllQRs()" class="btn btn-primary">
                    ⬇️ Download All QR Codes
                </button>
                <button onclick="window.print()" class="btn btn-secondary">
                    🖨️ Print QR Codes
                </button>
                <button onclick="saveToDatabase()" class="btn btn-success" id="saveBtn">
                    💾 Save All to Inventory
                </button>
            </div>
            <div id="saveStatus" style="margin-top: 10px; padding: 10px; border-radius: 8px; display: none;"></div>
        </div>

        <p style="margin-top: 20px">
            <a href="index.html">← Back to Scanner</a> |
            <a href="dashboard.html">📊 Dashboard</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>

    <script>
        let generatedQRs = [];
        let generatedItems = [];

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('generateForm');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const itemName = document.getElementById('itemName').value.trim();
                const quantity = parseInt(document.getElementById('quantity').value);
                const category = document.getElementById('category').value.trim() || itemName;

                if (!itemName || quantity < 1) {
                    alert('Please enter a valid item name and quantity.');
                    return;
                }

                await generateQRCodes(itemName, quantity, category);
            });
        });

        async function generateQRCodes(itemName, quantity, category) {
            const outputDiv = document.getElementById('qrOutput');
            const gridDiv = document.getElementById('qrGrid');

            gridDiv.innerHTML = '';
            outputDiv.style.display = 'block';
            generatedQRs = [];
            generatedItems = [];

            const baseUrl = window.location.origin + window.location.pathname.replace('generate.html', 'index.html');

            for (let i = 1; i <= quantity; i++) {
                const uniqueId = generateUniqueId(itemName, i);
                const fullUrl = `${baseUrl}?id=${uniqueId}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(fullUrl)}`;

                const div = document.createElement('div');
                div.className = 'qr-item';
                div.innerHTML = `
                    <img src="${qrUrl}" alt="QR Code for ${uniqueId}" loading="lazy">
                    <strong>${uniqueId}</strong>
                    <br><small style="color:#718096;">${category}</small>
                `;
                gridDiv.appendChild(div);

                generatedQRs.push({ id: uniqueId, url: qrUrl, category: category });
                generatedItems.push({
                    unique_id: uniqueId,
                    category: category,
                    status: 'unregistered',
                    quantity: 1
                });
            }

            outputDiv.scrollIntoView({ behavior: 'smooth' });
            showStatus('success', `✅ Generated ${generatedQRs.length} QR codes! Click "Save All to Inventory" to save.`);
        }

        function downloadAllQRs() {
            if (generatedQRs.length === 0) {
                alert('No QR codes to download.');
                return;
            }

            generatedQRs.forEach((qr, index) => {
                const link = document.createElement('a');
                link.download = `${qr.id}.png`;
                link.href = qr.url;
                document.body.appendChild(link);
                setTimeout(() => {
                    link.click();
                    document.body.removeChild(link);
                }, index * 300);
            });
        }

        // =============================================
        // SAVE TO DATABASE - FIXED VERSION
        // =============================================
        async function saveToDatabase() {
            const items = generatedItems;

            if (!items || items.length === 0) {
                alert('No items to save. Generate QR codes first.');
                return;
            }

            const statusDiv = document.getElementById('saveStatus');
            statusDiv.style.display = 'block';
            statusDiv.style.background = '#f0f0f0';
            statusDiv.style.color = '#333';
            statusDiv.textContent = `⏳ Saving ${items.length} items...`;

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Saving...';

            try {
                // First test the connection
                const connected = await testSupabaseConnection();
                if (!connected) {
                    throw new Error('Cannot connect to Supabase. Please check your internet connection.');
                }

                // Save all items at once
                const result = await saveItemsToSupabase(items);
                
                statusDiv.style.background = '#c6f6d5';
                statusDiv.style.color = '#22543d';
                statusDiv.textContent = `✅ ${items.length} items saved successfully!`;
                alert(`✅ ${items.length} items saved to the database!\n\nYou can now scan these QR codes.`);

            } catch (error) {
                console.error('Save error:', error);
                statusDiv.style.background = '#fed7d7';
                statusDiv.style.color = '#742a2a';
                statusDiv.textContent = `❌ Error: ${error.message}`;
                alert(`❌ Error saving to database:\n\n${error.message}\n\nPlease check:\n1. Your internet connection\n2. Supabase is running\n3. The "items" table exists\n4. Your API key is correct`);
            }

            btn.disabled = false;
            btn.textContent = '💾 Save All to Inventory';
        }

        function showStatus(type, message) {
            const statusDiv = document.getElementById('saveStatus');
            statusDiv.style.display = 'block';
            statusDiv.style.background = type === 'success' ? '#c6f6d5' : '#fed7d7';
            statusDiv.style.color = type === 'success' ? '#22543d' : '#742a2a';
            statusDiv.textContent = message;
        }
    </script>
</body>
</html>
